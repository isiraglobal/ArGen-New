<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Access - ArGen</title>
  <link rel="icon" type="image/png" href="../images/ArGen Logo.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .passcode-page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: #000;
    }

    .passcode-card {
      width: 100%;
      max-width: 400px;
      background: rgba(10, 10, 10, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 3rem;
      text-align: center;
    }

    .passcode-input {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 1rem;
      color: #fff;
      font-family: var(--font-mono);
      font-size: 1.5rem;
      text-align: center;
      letter-spacing: 4px;
      width: 100%;
      margin: 2rem 0;
      text-transform: uppercase;
    }

    .passcode-input:focus {
      outline: none;
      border-color: var(--argen-blue);
      background: rgba(255, 255, 255, 0.06);
    }
  </style>
</head>

<body class="bg-black">
  <script src="../js/auth-guard.js"></script>
  
  <div class="passcode-page">
    <div class="passcode-card">
      <img src="../images/ArGen Logo.png" alt="ArGen" style="width: 40px; margin-bottom: 2rem;">
      <h1 class="card-h3" style="font-size: 1.5rem;">Team <i class="soul-text">Verification</i></h1>
      <p style="color: var(--text-sec); font-size: 0.85rem; margin-top: 0.5rem;">Enter your team's secure access passcode to proceed to the workspace.</p>
      
      <form id="passcodeForm">
        <input type="text" id="passcode" class="passcode-input" placeholder="••••••••" maxlength="8" required autofocus>
        <button type="submit" class="btn btn-primary w-full" style="width: 100%; padding: 1rem;">Verify Access</button>
      </form>
      
      <div id="errorMsg" style="color: #ef4444; font-family: var(--font-mono); font-size: 0.7rem; margin-top: 1.5rem; display: none;">
        INVALID_PASSCODE: Access Denied
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    
    // If team admin or superadmin, they might have already bypassed this or have different flow
    // but the user said "everybody" or "after login". Let's apply it to all for now or gate it.

    document.getElementById('passcodeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = document.getElementById('passcode').value.toUpperCase();
      const errorEl = document.getElementById('errorMsg');
      
      try {
        const response = await argenApi.request('/auth/verify-passcode', {
          method: 'POST',
          body: JSON.stringify({ inviteCode: code })
        });
        
        if (response.valid) {
          // Store verification in session storage so it doesn't ask again this session
          sessionStorage.setItem('team_verified', 'true');
          window.location.href = '/dashboard';
        } else {
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'ERROR: ' + err.message;
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>

</html>
