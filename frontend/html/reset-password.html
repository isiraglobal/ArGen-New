<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - ArGen</title>
  <link rel="icon" type="image/png" href="/images/ArGen Logo.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 3rem;
      position: relative;
      z-index: 10;
    }
  </style>
</head>

<body class="bg-black">
  <div class="auth-container">
    <div class="auth-card">
      <div style="text-align: center; margin-bottom: 2.5rem;">
        <img src="/images/ArGen Logo.png" alt="ArGen" style="width: 40px; margin-bottom: 1.5rem;">
        <h1 class="section-h2" style="font-size: 2rem;">New <i class="soul-text">Credentials</i></h1>
        <p style="color: var(--text-sec); font-size: 0.85rem; margin-top: 0.5rem;">Set a strong password to secure your account.</p>
      </div>

      <form id="resetPasswordForm">
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" id="newPassword" class="form-input" placeholder="••••••••" required minlength="8">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" required minlength="8">
        </div>
        <button type="submit" id="resetBtn" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 16px;">Update Password</button>
      </form>

      <div style="text-align: center; margin-top: 2rem;">
        <a href="/html/login.html" style="color: var(--text-sec); font-size: 0.75rem; text-decoration: none; font-family: var(--font-mono);">BACK_TO_LOGIN</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      alert('Invalid or missing reset token.');
      window.location.href = '/html/login.html';
    }

    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (password !== confirm) {
        alert('Passwords do not match.');
        return;
      }

      const btn = document.getElementById('resetBtn');
      btn.disabled = true;
      btn.textContent = 'Updating...';

      try {
        await argenApi.request(`/auth/reset-password/${token}`, {
          method: 'POST',
          body: JSON.stringify({ password })
        });
        alert('Password updated successfully. Please login with your new credentials.');
        window.location.href = '/html/login.html';
      } catch (err) {
        alert(err.message);
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    });
  </script>
</body>

</html>
