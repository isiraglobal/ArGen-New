<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Access - ArGen Administrative</title>
  <link rel="icon" type="image/png" href="../images/ArGen Logo.png">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    :root {
      --admin-accent: #ef4444; /* Alert Red for Admin */
      --terminal-bg: #0a0a0a;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'JetBrains+Mono', monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      overflow: hidden;
    }

    .admin-bg {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 50% 50%, rgba(239, 68, 68, 0.05) 0%, transparent 50%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 4px);
      z-index: 0;
    }

    .admin-card {
      width: 100%;
      max-width: 400px;
      padding: 3rem;
      background: rgba(10, 10, 10, 0.8);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 4px;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 50px rgba(239, 68, 68, 0.1);
    }

    .admin-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .admin-header img {
      width: 40px;
      filter: grayscale(1) brightness(2) sepia(1) hue-rotate(-50deg) saturate(5); /* Make it red */
      margin-bottom: 1rem;
    }

    .admin-header h1 {
      font-size: 0.8rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--admin-accent);
      margin: 0;
    }

    .admin-header p {
      font-size: 0.6rem;
      opacity: 0.5;
      margin-top: 0.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      opacity: 0.7;
    }

    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 0.8rem;
      border-radius: 2px;
      transition: all 0.3s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--admin-accent);
      background: rgba(239, 68, 68, 0.05);
    }

    .btn-admin {
      width: 100%;
      padding: 14px;
      background: var(--admin-accent);
      color: #000;
      border: none;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.3s;
    }

    .btn-admin:hover {
      background: #fff;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    .error-msg {
      margin-top: 1.5rem;
      color: var(--admin-accent);
      font-size: 0.65rem;
      text-align: center;
      display: none;
      padding: 10px;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .scanline {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(239, 68, 68, 0.1);
      z-index: 2;
      pointer-events: none;
      animation: scan 4s linear infinite;
    }

    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }
  </style>
</head>
<body>
  <div class="admin-bg"></div>
  <div class="scanline"></div>

  <div class="admin-card">
    <div class="admin-header">
      <img src="../images/ArGen Logo.png" alt="ArGen">
      <h1>Administrative Access</h1>
      <p>Secure Terminal Link • Restricted Area</p>
    </div>

    <form id="adminForm">
      <div class="form-group">
        <label class="form-label">IDENTIFIER</label>
        <input type="email" id="email" class="form-input" placeholder="admin@argen.isira" required>
      </div>
      <div class="form-group">
        <label class="form-label">SECURITY_KEY</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-admin">Initialize Authorization</button>
    </form>

    <div id="errorMsg" class="error-msg"></div>
  </div>


  <script src="../js/api.js"></script>
  <script>
    document.getElementById('adminForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMsg');
      const btn = e.target.querySelector('button');

      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'AUTHORIZING...';

      try {
        const data = await argenApi.login(email, password);
        
        if (data.user.role !== 'superadmin') {
            throw new Error('ACCESS_DENIED: Insufficient Privileges');
        }

        window.location.href = '/admin-portal';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'RETRY AUTHORIZATION';
      }
    });
  </script>
</body>
</html>
