<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ArGen</title>
  <link rel="icon" type="image/png" href="../images/ArGen Logo.png">
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Roboto+Mono:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .login-container {
      max-width: 450px;
      margin: 0 auto;
      padding: 3rem;
      background: var(--charcoal);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-sec);
    }
    .form-input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      color: var(--white);
      font-family: var(--font-mono);
      transition: all 0.3s ease;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--argen-blue);
      background: rgba(255,255,255,0.08);
    }
    .error-msg {
      color: #ef4444;
      font-size: 0.8rem;
      font-family: var(--font-mono);
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body class="bg-black">
  <div class="scanlines"></div>
  <div class="noise-overlay"></div>

  <section class="section section-black" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="container">
      <div style="text-align: center; margin-bottom: 3rem;">
        <a href="index.html">
          <img src="../images/ArGen Logo.png" alt="ArGen" style="width: 60px; margin-bottom: 1rem;">
        </a>
        <h1 class="section-h2" style="font-size: 2rem; margin-bottom: 0.5rem;">System_Login</h1>
        <p class="section-sub">Enter credentials to access organization dashboard</p>
      </div>

      <div class="login-container">
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">EMAIL_ADDRESS</label>
            <input type="email" id="email" class="form-input" placeholder="admin@company.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">PASSWORD</label>
            <input type="password" id="password" class="form-input" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Initialize Session</button>
          <div id="errorMsg" class="error-msg"></div>
        </form>
        
        <div style="margin-top: 2rem; text-align: center; font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-sec);">
          Don't have an account? <a href="#" style="color: var(--argen-blue);">Contact Support</a>
        </div>
      </div>
    </div>
  </section>

  <script src="../js/api.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const submitBtn = document.getElementById('submitBtn');

      errorMsg.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Authenticating...';

      try {
        await window.argenApi.login(email, password);
        window.location.href = 'teams.html';
      } catch (err) {
        errorMsg.textContent = '> ERROR: ' + err.message;
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Initialize Session';
      }
    });
  </script>
</body>
</html>
