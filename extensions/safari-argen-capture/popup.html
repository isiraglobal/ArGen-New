<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; margin: 0; }
    .logo { font-size: 18px; font-weight: 700; color: #00ff88; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .logo img { width: 24px; height: 24px; }
    .status { font-size: 12px; color: #888; margin-bottom: 16px; }
    .status.active { color: #00ff88; }
    .stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; font-size: 13px; }
    .stat:last-child { border-bottom: none; }
    .stat-label { color: #888; }
    .stat-value { color: #fff; font-weight: 600; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; background: #00ff88; color: #000; font-weight: 600; cursor: pointer; margin-top: 12px; }
    .btn:hover { opacity: 0.9; }
    .btn-secondary { background: #222; color: #fff; margin-top: 8px; }
    .config { margin-top: 12px; }
    input { width: 100%; padding: 8px; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; color: #fff; font-size: 12px; margin-top: 4px; box-sizing: border-box; }
    label { font-size: 11px; color: #888; display: block; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="logo">⬡ ArGen Capture</div>
  <div class="status" id="status">Status: <span id="statusText">Checking...</span></div>
  <div class="stat"><span class="stat-label">Captured</span><span class="stat-value" id="captureCount">0</span></div>
  <div class="stat"><span class="stat-label">Session</span><span class="stat-value" id="sessionId">—</span></div>
  <div class="stat"><span class="stat-label">Last Sync</span><span class="stat-value" id="lastSync">—</span></div>
  <button class="btn" id="captureNow">Capture This Page</button>
  <button class="btn btn-secondary" id="openDashboard">Open Dashboard</button>
  <div class="config">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="Enter your ArGen API key">
    <label>API URL</label>
    <input type="text" id="apiUrl" placeholder="https://argen.isira.club/api" value="https://argen.isira.club/api">
  </div>
  <script src="popup.js"></script>
</body>
</html>
